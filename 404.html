<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found | Qekkel</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/png" href="/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #faf8f4;
      font-family: 'Source Sans 3', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      gap: 28px;
    }
    .err-num {
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 800;
      line-height: 1;
      color: rgba(255,255,255,0.04);
      letter-spacing: -0.04em;
      user-select: none;
    }
    .err-title {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 200;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
    }
    .err-sub {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.28);
      line-height: 1.7;
      max-width: 36ch;
    }
    .err-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
    .err-link {
      display: inline-block;
      padding: 11px 26px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 30px;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .err-link:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
    .err-link.primary {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.28);
      color: rgba(255,255,255,0.8);
    }
    .err-link.primary:hover { background: rgba(255,255,255,0.12); color: #fff; }
  </style>
</head>
<body>
  <p class="err-num">404</p>
  <p class="err-title">Page not found</p>
  <p class="err-sub">The page you're looking for doesn't exist or has been moved.</p>
  <div class="err-links">
    <a href="/" class="err-link primary">← Home</a>
    <a href="/store" class="err-link">Store</a>
  </div>
</body>
</html>
